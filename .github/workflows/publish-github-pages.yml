name: Publish GitHub Pages (gh-pages branch)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Does NOT use actions/deploy-pages — pushes static files to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: publish-gh-pages
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend for GitHub Pages
        working-directory: web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - name: Prepare GitHub Pages artifact
        working-directory: web/dist
        run: |
          touch .nojekyll
          cp index.html 404.html

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          enable_jekyll: false
          force_orphan: true

      - name: Done
        run: |
          echo "Published to gh-pages branch."
          echo "Site URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "Ensure repo Settings → Pages → Source = Deploy from branch → gh-pages / (root)"
