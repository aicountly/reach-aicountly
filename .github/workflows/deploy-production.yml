name: Deploy Production via SSH

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      REMOTE_ROOT: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
      SITE_HOST: reach.aicountly.org

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
        run: |
          # Normalize — services append v1/... paths; base must not end with /v1
          API_URL="${VITE_API_URL:-https://reach.aicountly.org/api}"
          API_URL="${API_URL%/}"
          API_URL="${API_URL%/v1}"
          export VITE_API_URL="$API_URL"
          echo "Building with VITE_API_URL=${VITE_API_URL}"
          npm ci
          npm run build
          test -f dist/index.html
          echo "Built $(find dist -type f | wc -l) files in web/dist"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.PROD_SFTP_HOST }}
          SSH_PORT: ${{ secrets.PROD_SFTP_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<EOF
          Host cpanel-prod
            HostName ${SSH_HOST}
            Port ${SSH_PORT}
            User ${{ secrets.PROD_SFTP_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
            RequestTTY no
            BatchMode yes
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 4
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      - name: Detect web document root
        run: |
          set -euo pipefail
          MARKER="reach-root-$(date +%s).txt"
          echo "$MARKER" > "$MARKER"
          DETECTED=""
          CANDIDATES="public_html ."
          if [ -n "${REMOTE_ROOT}" ] && [ "${REMOTE_ROOT}" != "." ] && [ "${REMOTE_ROOT}" != "auto" ] && [ "${REMOTE_ROOT}" != "public_html" ]; then
            CANDIDATES="$CANDIDATES ${REMOTE_ROOT}"
          fi
          for TARGET in $CANDIDATES; do
            echo "Probing deploy target: ${TARGET}"
            ssh -T cpanel-prod "mkdir -p '${TARGET}'" 2>/dev/null || true
            scp -F "$HOME/.ssh/config" -o BatchMode=yes "$MARKER" "cpanel-prod:${TARGET}/" 2>/dev/null || continue
            if curl -fsS "https://${SITE_HOST}/${MARKER}" 2>/dev/null | grep -q "$MARKER"; then
              DETECTED="$TARGET"
              echo "Document root confirmed: ${TARGET}"
              ssh -T cpanel-prod "rm -f '${TARGET}/${MARKER}'" || true
              break
            fi
            ssh -T cpanel-prod "rm -f '${TARGET}/${MARKER}'" 2>/dev/null || true
          done
          rm -f "$MARKER"
          if [ -z "$DETECTED" ]; then
            echo "ERROR: Could not detect document root over HTTP."
            echo "Set PROD_SFTP_REMOTE_ROOT to public_html (cPanel document root for this account)."
            exit 1
          fi
          echo "DEPLOY_ROOT=${DETECTED}" >> "$GITHUB_ENV"
          ssh -T cpanel-prod "echo 'SSH pwd:' \$(pwd); ls -la '${DETECTED}' | head -15"

      - name: Deploy SPA (web/dist → document root)
        run: |
          set -euo pipefail
          echo "Uploading SPA to ${DEPLOY_ROOT}..."
          timeout 600 scp -r -F "$HOME/.ssh/config" -o BatchMode=yes \
            web/dist/. "cpanel-prod:${DEPLOY_ROOT}/"
          ssh -T cpanel-prod "test -f '${DEPLOY_ROOT}/index.html'"
          echo "index.html confirmed on server"

      - name: Deploy API (server-php → document root/api)
        run: |
          set -euo pipefail
          tar -C server-php \
            --exclude='./.env' \
            --exclude='./.git' \
            --exclude='./vendor' \
            --exclude='./writable/logs' \
            --exclude='./writable/cache' \
            --exclude='./writable/session' \
            --exclude='./writable/uploads' \
            -czf api.tgz .
          timeout 600 scp -F "$HOME/.ssh/config" -o BatchMode=yes \
            api.tgz "cpanel-prod:${DEPLOY_ROOT}/api.tgz"
          echo "Extracting api.tgz into ${DEPLOY_ROOT}/api/ ..."
          ssh -T cpanel-prod "set -e
            cd '${DEPLOY_ROOT}'
            test -f api.tgz
            rm -rf api.staging
            mkdir -p api.staging/writable/logs api.staging/writable/cache api.staging/writable/session api.staging/writable/uploads
            if tar -xzf api.tgz -C api.staging; then
              echo 'Extracted with tar -xzf'
            elif gzip -dc api.tgz | tar -xf - -C api.staging; then
              echo 'Extracted with gzip | tar'
            else
              echo 'ERROR: Could not extract api.tgz on server (tar/gzip missing?)'
              exit 1
            fi
            rm -rf api
            mv api.staging api
            rm -f api.tgz
            test -f api/index.php || { echo 'ERROR: api/index.php missing after extract'; exit 1; }
            test -f api/.htaccess || { echo 'ERROR: api/.htaccess missing after extract'; exit 1; }
            echo 'api/ contents:'
            ls -la api | head -20"
          echo "api/ deployed to ${DEPLOY_ROOT}/api"

      - name: Verify API reachable over HTTP
        run: |
          set -euo pipefail
          API_HEALTH="https://${SITE_HOST}/api/health"
          echo "HTTP check: ${API_HEALTH}"
          BODY="$(curl -sS --retry 5 --retry-delay 4 "$API_HEALTH")"
          echo "$BODY" | head -c 400
          echo ""
          echo "$BODY" | grep -q 'aicountly-reach-api' || {
            echo "ERROR: /api/health did not return API JSON."
            ssh -T cpanel-prod "ls -la '${DEPLOY_ROOT}/api' 2>/dev/null | head -10 || echo 'missing api dir'"
            exit 1
          }
          echo "API HTTP check OK"

      - name: Install PHP dependencies, migrate, and seed superadmin
        timeout-minutes: 15
        run: |
          set -euo pipefail
          timeout 840 ssh -T cpanel-prod bash <<REMOTE
          set -e
          cd '${DEPLOY_ROOT}/api'
          if command -v composer >/dev/null 2>&1; then
            composer install --no-dev --optimize-autoloader --no-interaction
          elif [ -f composer.phar ]; then
            php composer.phar install --no-dev --optimize-autoloader --no-interaction
          else
            echo 'composer not found on server — install dependencies manually once.'
            exit 1
          fi
          php spark migrate --no-interaction
          php spark db:seed InitialReachSeeder --no-interaction
          REMOTE

      - name: Verify site, API, and login endpoint
        run: |
          set -euo pipefail
          echo "Checking homepage..."
          curl -fsS "https://${SITE_HOST}/" | grep -qi '<html'
          echo "Homepage OK"
          echo "Checking API health..."
          curl -fsS "https://${SITE_HOST}/api/health" | grep -q 'aicountly-reach-api'
          echo "API health OK"
          echo "Checking login route (expect 401/422 JSON, not HTML)..."
          LOGIN_CODE="$(curl -sS -o /tmp/login.json -w '%{http_code}' \
            -X POST "https://${SITE_HOST}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -d '{"email":"probe@example.com","password":"probe"}')"
          head -c 200 /tmp/login.json
          echo ""
          grep -q 'aicountly-reach-api\|"ok"' /tmp/login.json || grep -q '"error"' /tmp/login.json || {
            echo "ERROR: Login endpoint returned HTML instead of JSON (HTTP ${LOGIN_CODE})."
            exit 1
          }
          echo "Login route OK (HTTP ${LOGIN_CODE})"
