name: Deploy Production via SSH

# cPanel layout (PROD_SFTP_REMOTE_ROOT = public_html):
#   web/dist/      →  public_html/          (SPA)
#   server-php/    →  public_html/api/      (CodeIgniter API)
# Production api/.env is never overwritten by this workflow.

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PUBLIC_HTML: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
      SITE_HOST: reach.aicountly.org

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy paths
        run: |
          set -euo pipefail
          if [ -z "${PUBLIC_HTML}" ]; then
            echo "ERROR: PROD_SFTP_REMOTE_ROOT secret is not set."
            echo "Set it to public_html (cPanel document root for reach.aicountly.org)."
            exit 1
          fi
          echo "SPA target:  ${PUBLIC_HTML}/           (from web/dist/)"
          echo "API target:  ${PUBLIC_HTML}/api/       (from server-php/)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
        run: |
          API_URL="${VITE_API_URL:-https://reach.aicountly.org/api}"
          API_URL="${API_URL%/}"
          API_URL="${API_URL%/v1}"
          export VITE_API_URL="$API_URL"
          echo "Building with VITE_API_URL=${VITE_API_URL}"
          npm ci
          npm run build
          test -f dist/index.html
          echo "Built $(find dist -type f | wc -l) files in web/dist"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.PROD_SFTP_HOST }}
          SSH_PORT: ${{ secrets.PROD_SFTP_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<EOF
          Host cpanel-prod
            HostName ${SSH_HOST}
            Port ${SSH_PORT}
            User ${{ secrets.PROD_SFTP_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
            RequestTTY no
            BatchMode yes
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 4
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      - name: Prepare public_html on server
        run: |
          set -euo pipefail
          ssh -T cpanel-prod "set -e
            echo \"SSH pwd: \$(pwd)\"
            mkdir -p '${PUBLIC_HTML}/api/writable/'{logs,cache,session,uploads}
            ls -la '${PUBLIC_HTML}' | head -15"

      - name: Deploy SPA — web/dist → public_html
        run: |
          set -euo pipefail
          echo "Uploading web/dist/* → ${PUBLIC_HTML}/"
          timeout 600 scp -r -F "$HOME/.ssh/config" -o BatchMode=yes \
            web/dist/. "cpanel-prod:${PUBLIC_HTML}/"
          ssh -T cpanel-prod "test -f '${PUBLIC_HTML}/index.html'"
          echo "Confirmed ${PUBLIC_HTML}/index.html"

      - name: Deploy API — server-php → public_html/api
        run: |
          set -euo pipefail
          echo "Packaging server-php/ (excluding .env, vendor, writable data)..."
          tar -C server-php \
            --exclude='./.env' \
            --exclude='./.git' \
            --exclude='./vendor' \
            --exclude='./writable/logs' \
            --exclude='./writable/cache' \
            --exclude='./writable/session' \
            --exclude='./writable/uploads' \
            -czf api.tgz .
          timeout 600 scp -F "$HOME/.ssh/config" -o BatchMode=yes \
            api.tgz "cpanel-prod:${PUBLIC_HTML}/api.tgz"
          echo "Extracting into ${PUBLIC_HTML}/api/ ..."
          ssh -T cpanel-prod "set -e
            cd '${PUBLIC_HTML}'
            test -f api.tgz
            rm -rf api.staging
            mkdir -p api.staging/writable/logs api.staging/writable/cache api.staging/writable/session api.staging/writable/uploads
            if tar -xzf api.tgz -C api.staging; then
              echo 'Extracted with tar -xzf'
            elif gzip -dc api.tgz | tar -xf - -C api.staging; then
              echo 'Extracted with gzip | tar'
            else
              echo 'ERROR: Could not extract api.tgz on server'
              exit 1
            fi
            rm -rf api
            mv api.staging api
            rm -f api.tgz
            test -f api/index.php
            test -f api/.htaccess
            echo '${PUBLIC_HTML}/api/ contents:'
            ls -la api | head -20"
          echo "Confirmed ${PUBLIC_HTML}/api/index.php (api/.env on server is untouched)"

      - name: Verify API reachable over HTTP
        run: |
          set -euo pipefail
          API_HEALTH="https://${SITE_HOST}/api/health"
          echo "HTTP check: ${API_HEALTH}"
          BODY="$(curl -sS --retry 5 --retry-delay 4 "$API_HEALTH")"
          echo "$BODY" | head -c 400
          echo ""
          echo "$BODY" | grep -q 'aicountly-reach-api' || {
            echo "ERROR: /api/health did not return API JSON."
            ssh -T cpanel-prod "ls -la '${PUBLIC_HTML}/api' 2>/dev/null | head -10 || echo 'missing api folder'"
            exit 1
          }
          echo "API HTTP check OK"

      - name: Install PHP dependencies, migrate, and seed superadmin
        timeout-minutes: 15
        run: |
          set -euo pipefail
          timeout 840 ssh -T cpanel-prod bash <<REMOTE
          set -e
          cd '${PUBLIC_HTML}/api'
          if command -v composer >/dev/null 2>&1; then
            composer install --no-dev --optimize-autoloader --no-interaction
          elif [ -f composer.phar ]; then
            php composer.phar install --no-dev --optimize-autoloader --no-interaction
          else
            echo 'composer not found on server — install dependencies manually once.'
            exit 1
          fi
          php spark migrate --no-interaction
          php spark db:seed InitialReachSeeder --no-interaction
          REMOTE

      - name: Verify site, API, and login endpoint
        run: |
          set -euo pipefail
          curl -fsS "https://${SITE_HOST}/" | grep -qi '<html'
          echo "Homepage OK"
          curl -fsS "https://${SITE_HOST}/api/health" | grep -q 'aicountly-reach-api'
          echo "API health OK"
          LOGIN_CODE="$(curl -sS -o /tmp/login.json -w '%{http_code}' \
            -X POST "https://${SITE_HOST}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -d '{"email":"probe@example.com","password":"probe"}')"
          grep -q '"error"\|"ok"\|aicountly-reach-api' /tmp/login.json || {
            echo "ERROR: Login endpoint returned HTML (HTTP ${LOGIN_CODE})."
            exit 1
          }
          echo "Login route OK (HTTP ${LOGIN_CODE})"
