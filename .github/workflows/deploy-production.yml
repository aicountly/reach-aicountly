name: Deploy Production via SSH

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to cPanel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.PROD_SFTP_HOST }}
          SSH_PORT: ${{ secrets.PROD_SFTP_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<EOF
          Host cpanel-prod
            HostName ${SSH_HOST}
            Port ${SSH_PORT}
            User ${{ secrets.PROD_SFTP_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
            RequestTTY no
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy SPA (web/dist → public_html)
        env:
          REMOTE_ROOT: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
        run: |
          set -euo pipefail
          # cPanel SSH often lacks rsync or prints shell banners; tar over SSH is reliable.
          ssh -T cpanel-prod "mkdir -p '${REMOTE_ROOT}'"
          tar -C web/dist -czf - . | ssh -T cpanel-prod "cd '${REMOTE_ROOT}' && tar -xzf -"

      - name: Deploy API (server-php → public_html/api)
        env:
          REMOTE_ROOT: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
        run: |
          set -euo pipefail
          ssh -T cpanel-prod "mkdir -p '${REMOTE_ROOT}/api'"
          tar -C server-php \
            --exclude='./.env' \
            --exclude='./.git' \
            --exclude='./vendor' \
            --exclude='./writable/logs' \
            --exclude='./writable/cache' \
            --exclude='./writable/session' \
            --exclude='./writable/uploads' \
            -czf - . | ssh -T cpanel-prod "cd '${REMOTE_ROOT}/api' && tar -xzf -"

      - name: Install PHP dependencies and run migrations
        env:
          REMOTE_ROOT: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
        run: |
          ssh -T cpanel-prod "BASH_ENV=; ENV=; set -e
            cd '${REMOTE_ROOT}/api'
            if command -v composer >/dev/null 2>&1; then
              composer install --no-dev --optimize-autoloader --no-interaction
            elif [ -f composer.phar ]; then
              php composer.phar install --no-dev --optimize-autoloader --no-interaction
            else
              echo 'composer not found on server — install dependencies manually once.'
              exit 1
            fi
            php spark migrate --no-interaction"

      - name: Verify API health
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          BASE="${VITE_API_URL%/}"
          BASE="${BASE%/v1}"
          HEALTH_URL="${BASE}/health"
          echo "Checking ${HEALTH_URL}"
          curl -fsS --retry 3 --retry-delay 5 "$HEALTH_URL" | head -c 500
          echo ""
