name: Deploy Production via SSH

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      REMOTE_ROOT: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
        run: |
          npm ci
          npm run build
          test -f dist/index.html
          echo "Built $(find dist -type f | wc -l) files in web/dist"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.PROD_SFTP_HOST }}
          SSH_PORT: ${{ secrets.PROD_SFTP_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<EOF
          Host cpanel-prod
            HostName ${SSH_HOST}
            Port ${SSH_PORT}
            User ${{ secrets.PROD_SFTP_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
            RequestTTY no
            BatchMode yes
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 4
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify remote document root
        run: |
          set -euo pipefail
          echo "Document root target: ${REMOTE_ROOT}"
          ssh -T cpanel-prod "set -e
            echo \"SSH login directory: \$(pwd)\"
            echo \"Home: \${HOME:-unknown}\"
            mkdir -p '${REMOTE_ROOT}'
            mkdir -p '${REMOTE_ROOT}/api'
            echo \"Listing ${REMOTE_ROOT}:\"
            ls -la '${REMOTE_ROOT}' | head -25"

      - name: Deploy SPA (web/dist → document root)
        run: |
          set -euo pipefail
          ssh -T cpanel-prod "mkdir -p '${REMOTE_ROOT}'"
          echo "Uploading SPA files via scp..."
          timeout 600 scp -r -F "$HOME/.ssh/config" -o BatchMode=yes \
            web/dist/. "cpanel-prod:${REMOTE_ROOT}/"
          ssh -T cpanel-prod "test -f '${REMOTE_ROOT}/index.html'"
          ssh -T cpanel-prod "ls -la '${REMOTE_ROOT}' | head -20"
          echo "index.html confirmed on server"

      - name: Deploy API (server-php → document root/api)
        run: |
          set -euo pipefail
          ssh -T cpanel-prod "mkdir -p '${REMOTE_ROOT}/api/writable/'{logs,cache,session,uploads}"
          echo "Packaging API..."
          tar -C server-php \
            --exclude='./.env' \
            --exclude='./.git' \
            --exclude='./vendor' \
            --exclude='./writable/logs' \
            --exclude='./writable/cache' \
            --exclude='./writable/session' \
            --exclude='./writable/uploads' \
            -czf api.tgz .
          echo "Uploading API archive..."
          timeout 600 scp -F "$HOME/.ssh/config" -o BatchMode=yes \
            api.tgz "cpanel-prod:${REMOTE_ROOT}/api.tgz"
          echo "Extracting API on server..."
          ssh -T cpanel-prod "set -e
            mkdir -p '${REMOTE_ROOT}/api'
            tar -xzf '${REMOTE_ROOT}/api.tgz' -C '${REMOTE_ROOT}/api'
            rm -f '${REMOTE_ROOT}/api.tgz'
            test -f '${REMOTE_ROOT}/api/index.php'
            test -f '${REMOTE_ROOT}/api/.htaccess'
            ls -la '${REMOTE_ROOT}/api' | head -15"
          echo "api/index.php and api/.htaccess confirmed on server"

      - name: Verify API reachable over HTTP
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          set -euo pipefail
          SITE_URL="${VITE_API_URL%/}"
          SITE_URL="${SITE_URL%/api/v1}"
          SITE_URL="${SITE_URL%/api}"
          API_HEALTH="${SITE_URL}/api/health"
          echo "HTTP check: ${API_HEALTH}"
          BODY="$(curl -sS --retry 3 --retry-delay 3 "$API_HEALTH")"
          echo "$BODY" | head -c 400
          echo ""
          echo "$BODY" | grep -q 'aicountly-reach-api' || {
            echo "ERROR: /api/health returned HTML or an error — api/ is not deployed in the web document root."
            echo "Confirm PROD_SFTP_REMOTE_ROOT matches cPanel → Domains → Document Root."
            exit 1
          }
          echo "API HTTP check OK"

      - name: Install PHP dependencies and run migrations
        timeout-minutes: 15
        run: |
          timeout 840 ssh -T cpanel-prod "BASH_ENV=; ENV=; set -e
            cd '${REMOTE_ROOT}/api'
            if command -v composer >/dev/null 2>&1; then
              composer install --no-dev --optimize-autoloader --no-interaction
            elif [ -f composer.phar ]; then
              php composer.phar install --no-dev --optimize-autoloader --no-interaction
            else
              echo 'composer not found on server — install dependencies manually once.'
              exit 1
            fi
            php spark migrate --no-interaction"

      - name: Verify site and API
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          set -euo pipefail
          SITE_URL="${VITE_API_URL%/}"
          SITE_URL="${SITE_URL%/api/v1}"
          SITE_URL="${SITE_URL%/api}"
          echo "Checking homepage: ${SITE_URL}/"
          HOME_BODY="$(curl -fsS --retry 3 --retry-delay 5 "${SITE_URL}/")"
          echo "$HOME_BODY" | grep -qi 'Index of /' && {
            echo 'ERROR: Site still shows Apache directory listing.'
            echo 'Fix PROD_SFTP_REMOTE_ROOT to match cPanel → Domains → Document Root for reach.aicountly.org'
            exit 1
          }
          echo "$HOME_BODY" | grep -qi '<html' || {
            echo 'ERROR: Homepage did not return HTML.'
            exit 1
          }
          echo 'Homepage OK'
          HEALTH_URL="${SITE_URL}/api/health"
          echo "Checking API: ${HEALTH_URL}"
          API_BODY="$(curl -fsS --retry 3 --retry-delay 5 "$HEALTH_URL")"
          echo "$API_BODY" | head -c 500
          echo ""
          echo "$API_BODY" | grep -q 'aicountly-reach-api' || {
            echo 'ERROR: API health did not return expected JSON.'
            exit 1
          }
          echo 'API health OK'
