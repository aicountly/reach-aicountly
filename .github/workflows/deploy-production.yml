name: Deploy Production via SSH

# Secrets used (Settings → Secrets → Actions):
#   PROD_SFTP_HOST, PROD_SFTP_PORT, PROD_SFTP_USER, PROD_SSH_PRIVATE_KEY
#   PROD_SFTP_REMOTE_ROOT  → usually public_html (or . if SFTP is chrooted to docroot)
#   VITE_API_URL, VITE_APP_NAME
#
# Deploy layout:
#   web/dist/      →  {REMOTE_ROOT}/           (SPA)
#   server-php/    →  {REMOTE_ROOT}/api/       (API; .env never uploaded)
#
# SFTP-only (no shell): composer runs in CI; vendor/ is uploaded with the API.

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          PUBLIC_HTML: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
          SFTP_HOST: ${{ secrets.PROD_SFTP_HOST }}
          SFTP_USER: ${{ secrets.PROD_SFTP_USER }}
          SSH_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in PUBLIC_HTML SFTP_HOST SFTP_USER SSH_KEY; do
            eval "val=\${$name:-}"
            if [ -z "$val" ]; then
              echo "ERROR: Missing secret for $name"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          echo "PROD_SFTP_REMOTE_ROOT=${PUBLIC_HTML}"
          echo "SPA  → ${PUBLIC_HTML}/"
          echo "API  → ${PUBLIC_HTML}/api/"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Build frontend
        working-directory: web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
        run: |
          API_URL="${VITE_API_URL:-https://reach.aicountly.org/api}"
          API_URL="${API_URL%/}"
          API_URL="${API_URL%/v1}"
          export VITE_API_URL="$API_URL"
          npm ci
          npm run build
          test -f dist/index.html

      - name: Install API dependencies (CI)
        working-directory: server-php
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Stage API bundle
        run: |
          set -euo pipefail
          rm -rf staging/api
          mkdir -p staging/api
          rsync -a \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='writable/logs/*' \
            --exclude='writable/cache/*' \
            --exclude='writable/session/*' \
            --exclude='writable/uploads/*' \
            server-php/ staging/api/
          test -f staging/api/index.php
          test -d staging/api/vendor

      - name: Resolve SFTP document root (no shell required)
        id: paths
        env:
          PUBLIC_HTML: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.PROD_SFTP_PORT }}" -H "${{ secrets.PROD_SFTP_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

          MARKER="reach-probe-$(date +%s).txt"
          echo ok > "$MARKER"
          DEPLOY_BASE=""

          # Try secret path first, then common cPanel fallbacks
          for CAND in "${PUBLIC_HTML}" "public_html" "."; do
            CAND="${CAND%/}"
            [ -z "$CAND" ] && continue
            echo "Probing SFTP path: ${CAND}"
            REMOTE="${CAND}"
            [ "$CAND" = "." ] && REMOTE="."
            if scp -P "${{ secrets.PROD_SFTP_PORT }}" -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes \
              "$MARKER" "${{ secrets.PROD_SFTP_USER }}@${{ secrets.PROD_SFTP_HOST }}:${REMOTE}/" 2>/dev/null; then
              if curl -fsS "https://reach.aicountly.org/${MARKER}" 2>/dev/null | grep -q ok; then
                DEPLOY_BASE="$CAND"
                echo "Resolved document root: ${DEPLOY_BASE}"
                break
              fi
            fi
          done

          rm -f "$MARKER"
          if [ -z "$DEPLOY_BASE" ]; then
            echo "ERROR: Could not upload to a path served by https://reach.aicountly.org/"
            echo "Set PROD_SFTP_REMOTE_ROOT to public_html or . depending on your cPanel SFTP jail."
            exit 1
          fi

          if [ "$DEPLOY_BASE" = "." ]; then
            SPA_TARGET="."
            API_TARGET="api"
          else
            SPA_TARGET="${DEPLOY_BASE}"
            API_TARGET="${DEPLOY_BASE}/api"
          fi

          echo "deploy_base=${DEPLOY_BASE}" >> "$GITHUB_OUTPUT"
          echo "spa_target=${SPA_TARGET}" >> "$GITHUB_OUTPUT"
          echo "api_target=${API_TARGET}" >> "$GITHUB_OUTPUT"

      - name: Deploy SPA — web/dist → document root
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SFTP_HOST }}
          username: ${{ secrets.PROD_SFTP_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SFTP_PORT }}
          source: "web/dist/*,web/dist/.htaccess"
          target: ${{ steps.paths.outputs.spa_target }}
          overwrite: true
          rm: false

      - name: Deploy API — server-php → document root/api
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SFTP_HOST }}
          username: ${{ secrets.PROD_SFTP_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SFTP_PORT }}
          source: "staging/api/*,staging/api/.htaccess"
          target: ${{ steps.paths.outputs.api_target }}
          overwrite: true
          rm: false

      - name: Verify site and API
        run: |
          set -euo pipefail
          curl -fsS "https://reach.aicountly.org/" | grep -qi '<html'
          echo "Homepage OK"
          BODY="$(curl -sS --retry 5 --retry-delay 4 "https://reach.aicountly.org/api/health")"
          echo "$BODY" | head -c 300
          echo ""
          echo "$BODY" | grep -q 'aicountly-reach-api' || {
            echo "ERROR: /api/health did not return JSON."
            echo "Check cPanel File Manager: document root must contain api/index.php"
            exit 1
          }
          echo "API OK"
          curl -sS -o /tmp/login.json -X POST "https://reach.aicountly.org/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -d '{"email":"probe@example.com","password":"x"}'
          grep -q '"error"\|"ok"' /tmp/login.json || {
            echo "ERROR: login route returned HTML"
            exit 1
          }
          echo "Login route OK"
