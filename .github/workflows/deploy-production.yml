name: Deploy Production via SSH

# cPanel layout (PROD_SFTP_REMOTE_ROOT = public_html):
#   web/dist/      →  public_html/          (SPA)
#   server-php/    →  public_html/api/      (CodeIgniter API)
#
# SFTP-only hosts (no shell): files are uploaded via scp; composer runs in CI.
# Production api/.env is never uploaded. Run migrate/seed once via cPanel Terminal:
#   cd ~/public_html/api && php spark migrate && php spark db:seed InitialReachSeeder

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PUBLIC_HTML: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
      SITE_HOST: reach.aicountly.org

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy paths
        run: |
          set -euo pipefail
          if [ -z "${PUBLIC_HTML}" ]; then
            echo "ERROR: PROD_SFTP_REMOTE_ROOT secret is not set."
            echo "Set it to public_html (cPanel document root for reach.aicountly.org)."
            exit 1
          fi
          echo "SPA target:  ${PUBLIC_HTML}/           (from web/dist/)"
          echo "API target:  ${PUBLIC_HTML}/api/       (from server-php/)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Build frontend
        working-directory: web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
        run: |
          API_URL="${VITE_API_URL:-https://reach.aicountly.org/api}"
          API_URL="${API_URL%/}"
          API_URL="${API_URL%/v1}"
          export VITE_API_URL="$API_URL"
          echo "Building with VITE_API_URL=${VITE_API_URL}"
          npm ci
          npm run build
          test -f dist/index.html

      - name: Install API dependencies (CI)
        working-directory: server-php
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Stage API upload bundle
        run: |
          set -euo pipefail
          rm -rf /tmp/reach-api
          mkdir -p /tmp/reach-api
          rsync -a \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='writable/logs/*' \
            --exclude='writable/cache/*' \
            --exclude='writable/session/*' \
            --exclude='writable/uploads/*' \
            server-php/ /tmp/reach-api/
          test -f /tmp/reach-api/index.php
          test -f /tmp/reach-api/.htaccess
          test -d /tmp/reach-api/vendor
          echo "API bundle ready ($(find /tmp/reach-api -type f | wc -l) files)"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.PROD_SFTP_HOST }}
          SSH_PORT: ${{ secrets.PROD_SFTP_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<EOF
          Host cpanel-prod
            HostName ${SSH_HOST}
            Port ${SSH_PORT}
            User ${{ secrets.PROD_SFTP_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
            RequestTTY no
            BatchMode yes
            ConnectTimeout 30
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy SPA — web/dist → public_html
        run: |
          set -euo pipefail
          echo "Uploading web/dist/* → ${PUBLIC_HTML}/"
          timeout 600 scp -r -F "$HOME/.ssh/config" -o BatchMode=yes \
            web/dist/. "cpanel-prod:${PUBLIC_HTML}/"

      - name: Deploy API — server-php → public_html/api
        run: |
          set -euo pipefail
          echo "Uploading server-php/* → ${PUBLIC_HTML}/api/"
          timeout 900 scp -r -F "$HOME/.ssh/config" -o BatchMode=yes \
            /tmp/reach-api/. "cpanel-prod:${PUBLIC_HTML}/api/"

      - name: Verify site and API over HTTP
        run: |
          set -euo pipefail
          echo "Checking homepage..."
          curl -fsS "https://${SITE_HOST}/" | grep -qi '<html'
          echo "Homepage OK"
          echo "Checking API health..."
          BODY="$(curl -sS --retry 5 --retry-delay 4 "https://${SITE_HOST}/api/health")"
          echo "$BODY" | head -c 400
          echo ""
          echo "$BODY" | grep -q 'aicountly-reach-api' || {
            echo "ERROR: /api/health returned HTML — api/ folder missing or not extracted in public_html."
            echo "In cPanel File Manager confirm public_html/api/index.php exists."
            exit 1
          }
          echo "API health OK"
          echo "Checking login route..."
          LOGIN_CODE="$(curl -sS -o /tmp/login.json -w '%{http_code}' \
            -X POST "https://${SITE_HOST}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -d '{"email":"probe@example.com","password":"probe"}')"
          grep -q '"error"\|"ok"\|aicountly-reach-api' /tmp/login.json || {
            echo "ERROR: Login endpoint returned HTML (HTTP ${LOGIN_CODE})."
            exit 1
          }
          echo "Login route OK (HTTP ${LOGIN_CODE})"
