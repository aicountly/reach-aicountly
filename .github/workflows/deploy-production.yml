name: Deploy Production via SSH

# Manual only — Actions → Deploy Production via SSH → Run workflow.
# Matches engage-aicountly production deploy pattern.
#
#   web/dist/      →  $PROD_SFTP_REMOTE_ROOT/       (public_html)
#   server-php/    →  $PROD_SFTP_REMOTE_ROOT/api/  (never overwrites api/.env)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reach-production
  cancel-in-progress: true

env:
  PROD_SFTP_HOST: ${{ secrets.PROD_SFTP_HOST }}
  PROD_SFTP_PORT: ${{ secrets.PROD_SFTP_PORT }}
  PROD_SFTP_USER: ${{ secrets.PROD_SFTP_USER }}
  PROD_SFTP_REMOTE_ROOT: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
  SSH_OPTS: -T -o BatchMode=yes -o LogLevel=ERROR -o RequestTTY=no
  SCP_OPTS: -o BatchMode=yes -o LogLevel=ERROR -o RequestTTY=no
  RSYNC_PATH: env -i PATH=/usr/bin:/bin:/usr/local/bin:/usr/local/cpanel/3rdparty/bin rsync

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create web .env for production build
        env:
          VITE_API_URL_SECRET: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME_SECRET: ${{ secrets.VITE_APP_NAME }}
        run: |
          API_URL="${VITE_API_URL_SECRET:-https://reach.aicountly.org/api}"
          API_URL="${API_URL%/}"
          API_URL="${API_URL%/v1}"
          APP_NAME="${VITE_APP_NAME_SECRET:-Reach}"
          printf 'VITE_API_URL=%s\nVITE_APP_NAME=%s\n' "$API_URL" "$APP_NAME" > .env
          echo "Frontend build: VITE_API_URL=${API_URL}"

      - name: Build for production
        run: npm run build

      - name: Verify build output
        run: |
          test -d dist || (echo "dist missing — build failed" && exit 1)
          test -f dist/index.html
          echo "Build ready: $(find dist -type f | wc -l) files in dist"

      - name: Install server-php Composer dependencies (production)
        working-directory: server-php
        run: |
          composer install --no-dev --no-interaction --no-progress --optimize-autoloader --prefer-dist
          test -d vendor/codeigniter4/framework || (echo "CI4 framework missing after install" && exit 1)

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        working-directory: .
        run: |
          if [ -z "${PROD_SFTP_HOST:-}" ] || [ -z "${PROD_SFTP_PORT:-}" ]; then
            echo "::error::Set PROD_SFTP_HOST and PROD_SFTP_PORT in GitHub secrets."
            exit 1
          fi
          if [ -z "${PROD_SFTP_REMOTE_ROOT:-}" ]; then
            echo "::error::Set PROD_SFTP_REMOTE_ROOT to public_html in GitHub secrets."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if ! ssh-keyscan -T 15 -p "$PROD_SFTP_PORT" "$PROD_SFTP_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            printf 'Host %s\n Port %s\n StrictHostKeyChecking accept-new\n' "$PROD_SFTP_HOST" "$PROD_SFTP_PORT" >> ~/.ssh/config
            chmod 600 ~/.ssh/config
          fi

      - name: Verify SSH and remote rsync
        working-directory: .
        run: |
          REMOTE_ROOT="${PROD_SFTP_REMOTE_ROOT%/}"
          SSH_CMD=(ssh -p "$PROD_SFTP_PORT" ${SSH_OPTS} "${PROD_SFTP_USER}@${PROD_SFTP_HOST}")

          echo "Testing SSH login..."
          "${SSH_CMD[@]}" "echo SSH_OK"

          echo "Remote rsync:"
          "${SSH_CMD[@]}" "command -v rsync && rsync --version | head -1" || {
            echo "::error::rsync not available. Enable SSH/rsync in cPanel or contact hosting support."
            exit 1
          }

          echo "Ensuring remote paths: ${REMOTE_ROOT}/ and ${REMOTE_ROOT}/api/"
          "${SSH_CMD[@]}" "mkdir -p \"${REMOTE_ROOT}\" \"${REMOTE_ROOT}/api\""

      - name: Fix API files misplaced in document root
        working-directory: .
        continue-on-error: true
        run: |
          REMOTE_ROOT="${PROD_SFTP_REMOTE_ROOT%/}"
          scp -P "$PROD_SFTP_PORT" ${SCP_OPTS} scripts/cpanel-fix-api-in-root.sh \
            "${PROD_SFTP_USER}@${PROD_SFTP_HOST}:${REMOTE_ROOT}/cpanel-fix-api-in-root.sh"
          ssh -p "$PROD_SFTP_PORT" ${SSH_OPTS} "${PROD_SFTP_USER}@${PROD_SFTP_HOST}" \
            "bash '${REMOTE_ROOT}/cpanel-fix-api-in-root.sh' '${REMOTE_ROOT}' && rm -f '${REMOTE_ROOT}/cpanel-fix-api-in-root.sh'"

      - name: Deploy dist → public_html
        run: |
          REMOTE_ROOT="${PROD_SFTP_REMOTE_ROOT%/}"
          RSYNC_RSH="ssh -p ${PROD_SFTP_PORT} ${SSH_OPTS}"
          rsync -avz --delete \
            --rsync-path="${RSYNC_PATH}" \
            --exclude 'api/' \
            --exclude 'php.ini' \
            --exclude 'api.tgz' \
            --exclude 'app/' \
            --exclude 'composer.json' \
            --exclude 'composer.lock' \
            --exclude 'spark' \
            --exclude 'vendor/' \
            --exclude 'writable/' \
            -e "$RSYNC_RSH" \
            dist/ \
            "${PROD_SFTP_USER}@${PROD_SFTP_HOST}:${REMOTE_ROOT}/"

      - name: Stamp API revision
        working-directory: .
        run: echo "${{ github.sha }}" > server-php/REVISION

      - name: Deploy server-php → public_html/api
        working-directory: .
        run: |
          REMOTE_ROOT="${PROD_SFTP_REMOTE_ROOT%/}"
          RSYNC_RSH="ssh -p ${PROD_SFTP_PORT} ${SSH_OPTS}"
          rsync -avz --delete \
            --rsync-path="${RSYNC_PATH}" \
            --filter='merge scripts/cpanel-rsync-api.filters' \
            -e "$RSYNC_RSH" \
            server-php/ \
            "${PROD_SFTP_USER}@${PROD_SFTP_HOST}:${REMOTE_ROOT}/api/"

      - name: Post-deploy api setup (preserve .env)
        working-directory: .
        run: |
          REMOTE_ROOT="${PROD_SFTP_REMOTE_ROOT%/}"
          scp -P "$PROD_SFTP_PORT" ${SCP_OPTS} scripts/cpanel-post-deploy-api.sh \
            "${PROD_SFTP_USER}@${PROD_SFTP_HOST}:${REMOTE_ROOT}/api/cpanel-post-deploy-api.sh"
          ssh -p "$PROD_SFTP_PORT" ${SSH_OPTS} "${PROD_SFTP_USER}@${PROD_SFTP_HOST}" \
            "chmod +x '${REMOTE_ROOT}/api/cpanel-post-deploy-api.sh' && \
             bash '${REMOTE_ROOT}/api/cpanel-post-deploy-api.sh' '${REMOTE_ROOT}/api'"

      - name: Verify files on remote server
        working-directory: .
        run: |
          REMOTE_ROOT="${PROD_SFTP_REMOTE_ROOT%/}"
          ssh -p "$PROD_SFTP_PORT" ${SSH_OPTS} "${PROD_SFTP_USER}@${PROD_SFTP_HOST}" "
            echo '---- public_html ----'
            ls -lah '${REMOTE_ROOT}/'
            echo '---- api ----'
            ls -lah '${REMOTE_ROOT}/api/' || true
            test -f '${REMOTE_ROOT}/index.html' && echo 'OK: index.html in public_html'
            test -f '${REMOTE_ROOT}/api/index.php' && echo 'OK: api/index.php'
            test -f '${REMOTE_ROOT}/api/.env' && echo 'OK: api/.env exists' || echo 'MISSING: api/.env'
          "

      - name: Verify site and API over HTTP
        working-directory: .
        run: |
          set -euo pipefail
          SITE="https://reach.aicountly.org"
          curl -sS "${SITE}/" | grep -qi '<html'
          echo "Homepage OK"
          BODY=$(curl -sS "${SITE}/api/health")
          echo "$BODY" | head -c 400
          echo ""
          echo "$BODY" | grep -q 'aicountly-reach-api' || {
            echo "::error::/api/health did not return Reach API JSON"
            exit 1
          }
          echo "API health OK"
