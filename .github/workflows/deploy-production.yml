name: Deploy Production via SSH

# Secrets: PROD_SFTP_HOST, PROD_SFTP_PORT, PROD_SFTP_USER, PROD_SSH_PRIVATE_KEY,
#          PROD_SFTP_REMOTE_ROOT (public_html), VITE_API_URL, VITE_APP_NAME
#
#   web/dist/      →  public_html/
#   server-php/    →  public_html/api/   (.env on server is never uploaded)

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          PUBLIC_HTML: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
          SFTP_HOST: ${{ secrets.PROD_SFTP_HOST }}
          SFTP_USER: ${{ secrets.PROD_SFTP_USER }}
          SSH_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          for var in PUBLIC_HTML SFTP_HOST SFTP_USER SSH_KEY; do
            eval "v=\${$var:-}"
            [ -n "$v" ] || { echo "ERROR: $var missing (check GitHub secrets)"; exit 1; }
          done
          echo "Deploy: web/dist → ${PUBLIC_HTML}/ | server-php → ${PUBLIC_HTML}/api/"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Build frontend
        working-directory: web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
        run: |
          API_URL="${VITE_API_URL:-https://reach.aicountly.org/api}"
          API_URL="${API_URL%/}"
          API_URL="${API_URL%/v1}"
          export VITE_API_URL="$API_URL"
          npm ci
          npm run build

      - name: Install API dependencies (CI)
        working-directory: server-php
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Stage API bundle
        run: |
          set -euo pipefail
          rm -rf staging/api
          mkdir -p staging/api
          rsync -a \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='writable/logs/*' \
            --exclude='writable/cache/*' \
            --exclude='writable/session/*' \
            --exclude='writable/uploads/*' \
            server-php/ staging/api/
          echo "API files: $(find staging/api -type f | wc -l) (vendor: $(find staging/api/vendor -type f 2>/dev/null | wc -l))"

      - name: Resolve SFTP document root
        id: paths
        env:
          PUBLIC_HTML: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.PROD_SFTP_PORT }}" -H "${{ secrets.PROD_SFTP_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

          MARKER="reach-probe-$(date +%s).txt"
          echo ok > "$MARKER"
          DEPLOY_BASE=""
          for CAND in "${PUBLIC_HTML}" "public_html" "."; do
            CAND="${CAND%/}"
            [ -z "$CAND" ] && continue
            scp -P "${{ secrets.PROD_SFTP_PORT }}" -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes \
              "$MARKER" "${{ secrets.PROD_SFTP_USER }}@${{ secrets.PROD_SFTP_HOST }}:${CAND}/" 2>/dev/null || continue
            if curl -sS "https://reach.aicountly.org/${MARKER}" 2>/dev/null | grep -q ok; then
              DEPLOY_BASE="$CAND"
              echo "Document root: ${DEPLOY_BASE}"
              break
            fi
          done
          rm -f "$MARKER"
          [ -n "$DEPLOY_BASE" ] || { echo "ERROR: cannot resolve SFTP document root"; exit 1; }

          if [ "$DEPLOY_BASE" = "." ]; then
            echo "spa_target=." >> "$GITHUB_OUTPUT"
            echo "api_target=api" >> "$GITHUB_OUTPUT"
          else
            echo "spa_target=${DEPLOY_BASE}" >> "$GITHUB_OUTPUT"
            echo "api_target=${DEPLOY_BASE}/api" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy SPA — web/dist → document root
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SFTP_HOST }}
          username: ${{ secrets.PROD_SFTP_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SFTP_PORT }}
          source: "web/dist/*,web/dist/.htaccess"
          target: ${{ steps.paths.outputs.spa_target }}
          overwrite: true

      - name: Deploy API — full tree via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.PROD_SFTP_HOST }}
          port: ${{ secrets.PROD_SFTP_PORT }}
          username: ${{ secrets.PROD_SFTP_USER }}
          sshPrivateKey: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          localPath: ./staging/api/
          remotePath: ${{ steps.paths.outputs.api_target }}/
          sftpOnly: true

      - name: Verify site and API
        run: |
          set -euo pipefail
          SITE="https://reach.aicountly.org"

          HOME_CODE=$(curl -sS -o /tmp/home.html -w '%{http_code}' "${SITE}/")
          echo "Homepage HTTP ${HOME_CODE}"
          grep -qi '<html' /tmp/home.html || { echo "ERROR: homepage not HTML"; exit 1; }

          HEALTH_CODE=$(curl -sS -o /tmp/health.json -w '%{http_code}' "${SITE}/api/health")
          HEALTH_BODY=$(cat /tmp/health.json)
          echo "API health HTTP ${HEALTH_CODE}"
          echo "$HEALTH_BODY" | head -c 400
          echo ""

          echo "$HEALTH_BODY" | grep -q 'aicountly-reach-api' || {
            echo "ERROR: /api/health did not return API JSON."
            exit 1
          }

          if [ "$HEALTH_CODE" = "503" ]; then
            echo "$HEALTH_BODY" | grep -q 'Composer dependencies missing' && {
              echo "ERROR: vendor/ missing on server — SFTP upload incomplete."
              exit 1
            }
            echo "WARNING: API returned 503 but JSON present (check api/.env, PHP version, DB)."
          fi

          LOGIN_CODE=$(curl -sS -o /tmp/login.json -w '%{http_code}' \
            -X POST "${SITE}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -d '{"email":"probe@example.com","password":"x"}')
          echo "Login HTTP ${LOGIN_CODE}"
          grep -q '"error"\|"ok"\|aicountly-reach-api' /tmp/login.json || {
            echo "ERROR: login returned HTML"
            cat /tmp/login.json | head -c 200
            exit 1
          }
          echo "Deploy verification passed"
